<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LC Wholesale Group</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b0b0b;
  color: #fff;
}

.container {
  max-width: 1100px;
  margin: auto;
  padding: 40px 20px;
}

h1, h2, h3 {
  margin-bottom: 10px;
}

.contact-wrapper {
  display: flex;
  flex-wrap: wrap;
  gap: 40px;
}

.contact-info, .contact-form {
  flex: 1;
  min-width: 300px;
}

.contact-item {
  margin-bottom: 15px;
}

a {
  color: #d4af37;
  text-decoration: none;
}

.btn {
  display: inline-block;
  padding: 12px 20px;
  border: 1px solid #d4af37;
  color: #d4af37;
  margin-top: 10px;
}

input, textarea, select {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  background: #1a1a1a;
  border: none;
  color: #fff;
}

button {
  background: #d4af37;
  color: #000;
  border: none;
  padding: 12px;
  width: 100%;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h2>Contact</h2>

  <div class="contact-wrapper">

    <!-- LEFT -->
    <div class="contact-info">
      <h3>Direct Contact</h3>

      <p>
        Contact us using the method that works best for you. 
        We respond to all serious business inquiries promptly and with full confidentiality.
      </p>

      <div class="contact-item">
        <strong>Email:</strong><br>
        <a href="mailto:purchasing@lcwholesalegroup.com">
          purchasing@lcwholesalegroup.com
        </a>
      </div>

      <div class="contact-item">
        <strong>Phone:</strong><br>
        786-375-0758
      </div>

      <div class="contact-item">
        <strong>Location:</strong><br>
        Florida, United States
      </div>

      <a href="mailto:purchasing@lcwholesalegroup.com" class="btn">
        Send Email
      </a>
    </div>

    <!-- FORM -->
    <div class="contact-form">
      <form action="https://formspree.io/f/xyknqjnz" method="POST">

        <input type="text" name="name" placeholder="Full Name" required>

        <input type="email" name="email" placeholder="Email Address" required>

        <select name="service">
          <option value="">Select Service</option>
          <option>Wholesale Distribution</option>
          <option>Export Services</option>
        </select>

        <textarea name="message" placeholder="Message" required></textarea>

        <button type="submit">Send Message</button>

      </form>
    </div>

  </div>
</div>

</body>
</html>
